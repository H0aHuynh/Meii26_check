<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tra cứu Giấy phép</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-6">
  
  <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
    <h1 class="text-2xl font-bold text-center mb-6">🔑 Kiểm tra giấy phép</h1>
    
    <div class="space-y-4">
      <input type="text" id="UUID" placeholder="Nhập UDID hoặc Token..." 
             class="w-full px-4 py-3 bg-slate-800 rounded-xl border border-slate-700 focus:outline-none focus:border-blue-500 text-lg">
      <button onclick="checkLicense()" id="btn" 
              class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold transition active:scale-[0.98]">
        Kiểm tra
      </button>
    </div>

    <div id="result" class="mt-6 hidden"></div>
  </div>

  <script>
    async function checkLicense() {
      const queryValue = document.getElementById('UUID').value.trim();
      const resDiv = document.getElementById('result');
      const btn = document.getElementById('btn');

      if (!queryValue) { alert('Vui lòng nhập thông tin!'); return; }
      
      btn.disabled = true;
      btn.innerHTML = 'Đang tra cứu...';
      resDiv.classList.remove('hidden');
      resDiv.innerHTML = '<p class="text-center text-yellow-500 animate-pulse">Đang kết nối...</p>';

      try {
        const res = await fetch('https://xazngjitsntmmmfwvisb.supabase.co/functions/v1/check-license', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ queryValue: queryValue })
        });
        const data = await res.json();

        if (data.success) {
          const isPro = data.package === 'Nâng cấp';
          resDiv.innerHTML = `
            <div class="bg-emerald-950/30 border border-emerald-500 p-5 rounded-xl text-sm space-y-2">
              <p class="text-emerald-400 font-bold text-center mb-2">✅ Đã kích hoạt</p>
              <p>Thiết bị: <span class="font-bold text-white">${data.device_model}</span></p>
              <p>Gói: <span class="font-bold ${isPro ? 'text-amber-400' : 'text-blue-400'} uppercase">${data.package}</span></p>
              <p>UDID: <span class="font-mono text-slate-300 block bg-black p-1 rounded mt-1">${data.udid}</span></p>
              <p>Token: <span class="font-mono font-bold text-blue-400 block bg-black p-1 rounded mt-1">${data.token}</span></p>
              
            </div>`;
        } else {
          resDiv.innerHTML = `<div class="bg-red-950/30 border border-red-500 p-5 rounded-xl text-center text-red-400">❌ ${data.error}</div>`;
        }
      } catch (e) {
        resDiv.innerHTML = '<div class="bg-red-900/30 border border-red-500 p-5 rounded-xl text-center text-red-400">Lỗi kết nối máy chủ!</div>';
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Kiểm tra';
      }
    }

    // Tự động kích hoạt khi có UDID trên URL
    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const udid = params.get('udid');
      if (udid) {
        document.getElementById('UUID').value = udid;
        checkLicense();
      }
    };
  </script>
</body>
</html>

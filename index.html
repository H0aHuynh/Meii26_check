<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta charset="UTF-8">
  <title>Tra cứu Giấy phép</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-6">
  <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
    <h1 class="text-2xl font-bold text-center mb-6">🔑 Kiểm tra giấy phép</h1>
    
    <div class="space-y-4">
      <input type="text" id="UUID" placeholder="Nhập UUID thiết bị..." 
             class="w-full px-4 py-3 bg-slate-800 rounded-xl border border-slate-700 focus:outline-none focus:border-blue-500">
      <button onclick="checkLicense()" id="btn" 
              class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">Kiểm tra</button>
    </div>

    <div id="result" class="mt-6 hidden"></div>
  </div>

  <script>
    async function checkLicense() {
      const UUID = document.getElementById('UUID').value.trim();
      const resDiv = document.getElementById('result');
      const btn = document.getElementById('btn');

      if (!UUID) { alert('Vui lòng nhập UUID!'); return; }
      
      btn.disabled = true;
      resDiv.classList.remove('hidden');
      resDiv.innerHTML = '<p class="text-center text-yellow-500">Đang tra cứu...</p>';

      try {
        const res = await fetch('https://xazngjitsntmmmfwvisb.supabase.co/functions/v1/check-license', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ UUID: UUID })
        });
        const data = await res.json();

        if (data.success) {
          const isPro = data.package == 'Nâng cấp';
          const colorClass = isPro ? 'text-amber-400' : 'text-blue-400';
          
          resDiv.innerHTML = `
            <div class="bg-emerald-950/30 border border-emerald-500 p-4 rounded-xl text-sm space-y-3">
              <p class="text-emerald-400 font-bold text-center">✅ Đã kích hoạt</p>
              <div class="flex justify-between border-b border-emerald-500/20 pb-2">
                <span>Thiết bị:</span> <span class="font-bold text-white">${data.device_model}</span>
              </div>
              <div class="flex justify-between border-b border-emerald-500/20 pb-2">
                <span>Gói dịch vụ:</span> <span class="font-bold ${colorClass} uppercase">${data.package}</span>
              </div>
              <div class="pt-2">
                <span class="text-slate-400 text-xs">Mã Token:</span>
                <code class="bg-black p-2 block mt-1 rounded text-white font-mono border border-slate-700">${data.token}</code>
              </div>
            </div>`;
        } else {
          resDiv.innerHTML = `<div class="bg-red-950/30 border border-red-500 p-4 rounded-xl text-center text-red-400">❌ ${data.error}</div>`;
        }
      } catch (e) {
        resDiv.innerHTML = '<div class="bg-red-900/30 border border-red-500 p-4 rounded-xl text-center text-red-400">Lỗi kết nối server!</div>';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>

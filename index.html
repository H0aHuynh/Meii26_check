<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kiểm tra giấy phép</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-slate-800 rounded-3xl p-8 shadow-2xl">
    <h1 class="text-2xl font-bold mb-6 text-center">🔑 Kiểm tra giấy phép</h1>
    <input type="text" id="UUID" placeholder="Nhập UUID" class="w-full px-4 py-3 bg-slate-700 rounded-xl mb-4 border border-slate-600 focus:outline-none focus:border-blue-500">
    <button onclick="checkLicense()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">Kiểm tra</button>
    <div id="result" class="mt-6 hidden"></div>
  </div>

  <script>
    async function checkLicense() {
      const UUID = document.getElementById('UUID').value.trim();
      const resDiv = document.getElementById('result');
      const btn = document.getElementById('btn');

      if (!UUID) { alert('Vui lòng nhập UUID!'); return; }
      
      btn.disabled = true;
      resDiv.classList.remove('hidden');
      resDiv.innerHTML = '<p class="text-center text-yellow-500">Đang kiểm tra...</p>';

      try {
        const res = await fetch('https://xazngjitsntmmmfwvisb.supabase.co/functions/v1/check-license', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ UUID: UUID })
        });
        const data = await res.json();

        if (data.success) {
          resDiv.innerHTML = `
            <div class="bg-green-900/30 border border-green-500 p-4 rounded-xl text-center">
              <p class="text-green-400 font-bold">✅ ${data.message}</p>
              <p class="text-sm mt-2">Thiết bị: ${data.device_model}</p>
              <p class="text-sm mt-3">Gói: ${data.package}</p>
            </div>`;
        } else {
          resDiv.innerHTML = `<div class="bg-red-900/30 border border-red-500 p-4 rounded-xl text-center text-red-400">❌ ${data.error}</div>`;
        }
      } catch (e) {
        resDiv.innerHTML = '<div class="bg-red-900/30 border border-red-500 p-4 rounded-xl text-center text-red-400">❌ Lỗi kết nối server.</div>';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
